name: ci

on: push

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v3
      - uses: Swatinem/rust-cache@v2
      - name: Docker Compose
        run: docker compose -f test/docker-compose.yml up -d redis

      - name: Build
        run: cargo build
      - name: Clippy
        run: cargo clippy
      - name: Fmt
        run: cargo fmt -- --check

      - name: Test
        run: cargo test
